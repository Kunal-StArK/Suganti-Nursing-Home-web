{% extends "base.html" %}

    {% block content %}

    
    <!-- aboutform-->
    <main class="main-content">
        <section id="about-page">
            <h2 class="section-title">Marks Sheet of a Student</h2>
            <div class="about-content">
                <div class="row">
                    <div class="col-12">
                        <form method="post">
                            {% csrf_token %}
                               <div>
                                    <label>Subject 1</label>
                                    <input type="text" name ="sub1" placeholder="Enter marks of subject 1"/>
                                </div>
                                <div>
                                    <label>Subject 2</label>
                                    <input type="text" name ="sub2" placeholder="Enter marks of subject 2"/>
                                </div>
                                <div>
                                    <label>Subject 3</label>
                                    <input type="text" name ="sub3" placeholder="Enter marks of subject 3"/>
                                </div>
                                <div>
                                    <label>Subject 4</label>
                                    <input type="text" name ="sub4" placeholder="Enter marks of subject 4"/>
                                </div>
                                <div>
                                    <label>Subject 5</label>
                                    <input type="text" name ="sub5" placeholder="Enter marks of subject 5"/>
                                </div>
                            
                            <div>
                                <button type="submit" style="margin-left: 60px; background-color: aqua;"> Marksheet </button>
                            </div> 
                            <div >
                                 <label>Total Marks</label>
                                <input type="text" value="{{total}}"/>
                            </div> 
                            <div style="margin-left: 28px;">
                                 <label>Percent</label>
                                <input type="text" value="{{percent}}"/>
                            </div>   
                            <div style="margin-left: 25px;">
                                 <label>Division</label>
                                <input type="text" value="{{division}}"/>
                            </div>                           
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER SECTION -->
    {% endblock %}
